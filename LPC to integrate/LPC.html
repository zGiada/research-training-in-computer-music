	<script>
	var ctx;
	var play = false;
	
	const control = document.getElementById("control");
	const time = document.getElementById("time");
	const freq = document.getElementById("freq");
	const freq2 = document.getElementById("freq2");
	const htmlup = document.getElementById("update");
	const stat = document.getElementById("stat");
	var table = [document.getElementById("t1"), document.getElementById("t2")];
	
	var analyser;
	
	
	
	function start() {
		ctx = new AudioContext({latencyHint: "interactive"}); // Frequenza di campionamento di sistema: 48000 Hz
		freq.innerHTML = "sampleRate: <b>" + ctx.sampleRate + " Hz</b>";
		freq2.innerHTML = "sottocampionamento: <b>" + f1 + " Hz</b>";
		htmlup.innerHTML = "aggiornamento ogni <b>" + update + " ms</b>";
		play = false;
		
		// Ottenimento dell'audio dal microfono
		navigator.mediaDevices
			.getUserMedia({audio: {
                    echoCancellation: false,
                    noiseSuppression: false,
                    autoGainControl: false,
                    highpassFilter: false,
					sampleRate: 44100 // Operazione bellamente ignorata
                }})
			.then((stream) => {
				document.getElementById("start").remove();
				document.getElementById("divcontrol").style.display = "block";
				
				play = true;
				const source = ctx.createMediaStreamSource(stream);
				const analyser = ctx.createAnalyser();
				analyser.fftSize = 32768;
				let wave = new Float32Array(analyser.fftSize);
				let signal = new Float32Array(32768);
				
				source.connect(analyser);
				//analyser.connect(ctx.destination); // per ascoltare l'audio in input
				
				
				setInterval(function () {
					if (play) {
						analyser.getFloatTimeDomainData(signal);
						getVowel(signal, ctx.sampleRate);
					}
				}, update);
				
			})
			.catch((err) => {
				console.log(err);
			});
	}
	
	function toggle() {
		if (play) {
			ctx.suspend();
			control.innerHTML = "Riprendi";
		} else {
			ctx.resume();
			control.innerHTML = "Ferma";
		}
		play = !play;
	}
	
	function aggiungiRiga(t, array) {
		var row = table[t].insertRow();
		for (let i = 0; i < array.length; i++) {
			var cell = row.insertCell();
			if (typeof(array[i]) == 'object') {
				cell.innerHTML = '<span style="background-color: #d9ffc9;">' + (Math.floor(array[i].freq * 1000) / 1000) + '</span>';
				cell.style.backgroundColor = '#d9ffc9';
				var cell = row.insertCell();
				cell.innerHTML = (Math.floor(array[i].band * 1000) / 1000);
			} else if (array[i] == 0) {
				cell.innerHTML = '&nbsp;';
			} else if (typeof(array[i]) == 'string') {
				cell.innerHTML = array[i];
			} else {
				cell.innerHTML = Math.floor(array[i] * 1000) / 1000;
			}
			if (array[i] == 0 || typeof(array[i]) == 'string') {
				cell.style.backgroundColor = '#ffffb5';
			} else {
				cell.style.borderStyle = 'solid';
				cell.style.borderWidth = '0px 0px 1px 0px';
				cell.style.fontSize = '0.8em';
			}
		}
		window.scrollTo(window.pageXOffset, document.body.scrollHeight);
		
		/*it[t] = it[t] + 1;
		if (it[t] > 100)
			table[t].deleteRow(0);
		*/
	}
