<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microphone Pitch Detection</title>
</head>

<body>
    <h1>Microphone Pitch Detection</h1>
    <p>Pitch (Fundamental Frequency): <span id="pitch">Calculating...</span></p>

    <script>
        let audioContext;
        let mediaStream;
        let analyser;

        const bufferSize = 2048; // Adjust the buffer size as needed.
        const audioBuffer = new Float32Array(bufferSize);
        const pitchDisplay = document.getElementById("pitch");

        function init() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                mediaStream = navigator.mediaDevices.getUserMedia({ audio: true });

                analyser = audioContext.createAnalyser();
                analyser.fftSize = bufferSize * 2;
                const source = audioContext.createMediaStreamSource(mediaStream);
                source.connect(analyser);

                analyser.connect(audioContext.destination);

                estimatePitch();
            } catch (error) {
                console.error("Error accessing microphone:", error);
            }
        }

        function estimatePitch() {
            analyser.getFloatTimeDomainData(audioBuffer);

            // Implement a pitch detection algorithm here.
            // This example uses a simplified autocorrelation-based method.
            const pitch = autocorrelationPitch(audioBuffer, audioContext.sampleRate);

            pitchDisplay.textContent = `${pitch.toFixed(2)} Hz`;

            requestAnimationFrame(estimatePitch);
        }

        function autocorrelationPitch(audioBuffer, sampleRate) {
            const len = audioBuffer.length;
            let maxCorrelation = 0;
            let pitch = 0;

            for (let lag = 1; lag < len / 2; lag++) {
                let correlation = 0;
                for (let i = 0; i < len - lag; i++) {
                    correlation += audioBuffer[i] * audioBuffer[i + lag];
                }
                if (correlation > maxCorrelation) {
                    maxCorrelation = correlation;
                    pitch = sampleRate / lag;
                }
            }

            return pitch;
        }

        window.addEventListener("load", init);
    </script>
</body>

</html>
